<style>
/* ...既存のスタイル... */

aside { 
  width: 300px; 
  height: 100vh; 
  background: #111; 
  border-right: 1px solid #333; 
  position: relative;
  z-index: 1000;
  flex-shrink: 0;
  transition: margin-left 0.3s ease; /* transitionを標準装備に */
}

/* 閉じている状態：margin-leftで制御するのが一番確実です */
aside.is-hidden {
  margin-left: -300px;
}

#toggle-btn {
  position: absolute; 
  top: 50%; 
  transform: translateY(-50%);
  left: 300px; 
  z-index: 9999;
  width: 24px; height: 80px; 
  background: #222; 
  border: 1px solid #444; 
  border-left: none;
  border-radius: 0 8px 8px 0; 
  display: flex; align-items: center; justify-content: center;
  touch-action: none;
  transition: left 0.3s ease; /* サイドバーの動きと同期 */
}

/* サイドバーが隠れた時のボタン位置 */
aside.is-hidden + #toggle-btn {
  left: 0;
}

/* ドラッグ中（リサイズ中）はアニメーションを切って追従性を上げる */
.dragging aside, .dragging #toggle-btn {
  transition: none !important;
}
</style>

<script>
const aside = document.querySelector('aside');
const toggleBtn = document.getElementById('toggle-btn');
const wrapper = document.querySelector('.main-wrapper');

let isDragging = false;
let startX = 0;
let currentWidth = 300;
let hasMoved = false; // タップかドラッグかを判定するフラグ

// タッチ開始
toggleBtn.addEventListener('touchstart', (e) => {
  isDragging = true;
  hasMoved = false;
  startX = e.touches[0].clientX;
  currentWidth = aside.offsetWidth;
  wrapper.classList.add('dragging'); // アニメーションを一時無効化
}, { passive: true });

// タッチ中（リサイズ）
window.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  
  const deltaX = e.touches[0].clientX - startX;
  if (Math.abs(deltaX) > 5) hasMoved = true; // 5px以上動いたらドラッグとみなす

  let newWidth = currentWidth + deltaX;
  if (newWidth < 50) newWidth = 0; // 一定以下で閉じる準備
  if (newWidth > window.innerWidth * 0.8) newWidth = window.innerWidth * 0.8;

  aside.style.width = newWidth + 'px';
  toggleBtn.style.left = newWidth + 'px';
}, { passive: false });

// タッチ終了
window.addEventListener('touchend', () => {
  if (!isDragging) return;
  isDragging = false;
  wrapper.classList.remove('dragging');

  if (!hasMoved) {
    // 【重要】ドラッグしていなければ「タップ」として開閉
    toggleSidebar();
  } else {
    // ドラッグ終了時のスナップ処理
    const finalWidth = aside.offsetWidth;
    if (finalWidth < 150) {
      closeSidebar();
    } else {
      openSidebar(finalWidth);
    }
  }
});

function toggleSidebar() {
  if (aside.classList.contains('is-hidden')) {
    openSidebar(300);
  } else {
    closeSidebar();
  }
}

function openSidebar(width) {
  aside.classList.remove('is-hidden');
  aside.style.width = width + 'px';
  aside.style.marginLeft = '0';
  toggleBtn.style.left = width + 'px';
}

function closeSidebar() {
  aside.classList.add('is-hidden');
  aside.style.marginLeft = '-300px'; // CSSのwidthと合わせる
  toggleBtn.style.left = '0';
}
</script>
