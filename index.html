<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Kei.works ViewTune test2</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<style>
body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; touch-action: none; position: fixed; width: 100%; height: 100%; }
#splash { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.8s; pointer-events: none; }
.splash-logo { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 100; letter-spacing: 12px; }
.main-wrapper { display: flex; width: 100vw; height: 100vh; visibility: hidden; position: relative; background: #000; overflow: hidden; } 
aside { width: 300px; height: 100vh; background: #111; border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding: 15px 10px; box-sizing: border-box; overflow-y: auto; z-index: 1000; transition: transform 0.3s, margin-left 0.3s; flex-shrink: 0; }
aside.hidden { transform: translateX(-100%); margin-left: -300px; }
#toggle-btn { position: absolute; top: 50%; left: 300px; transform: translateY(-50%); z-index: 9999; width: 20px; height: 80px; background: #222; border: 1px solid #444; border-left: none; border-radius: 0 8px 8px 0; transition: left 0.3s; }
#toggle-btn.is-hidden { left: 0 !important; }
#fs-btn { position: absolute; top: 15px; right: 15px; z-index: 150; width: 36px; height: 36px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 6px; }
#resizer { width: 14px; cursor: col-resize; background: transparent; z-index: 101; margin-left: -7px; flex-shrink: 0; }
.sep { width: 100%; border-bottom: 1px solid #444; margin: 15px 0; }
#clock-cvs { width: 90%; aspect-ratio: 1/1; }
#digital-clock { font-size: 2.2rem; margin: 5px 0; font-variant-numeric: tabular-nums; }
.round-btn { width: 42px; height: 42px; border-radius: 50%; background: #ddd; color: #000; border: none; font-weight: 700; }
.btn-row { display: flex; gap: 10px; margin: 8px 0; }
.file-select-btn { cursor: pointer; background: #ddd; color: #000; padding: 7px 0; width: 85%; border-radius: 6px; font-size: 11px; font-weight: 700; text-align: center; margin-bottom: 5px; }
.mode-switch { width: 85%; display: flex; background: #333; border-radius: 15px; padding: 2px; }
.mode-btn { flex: 1; border: none; background: none; color: #888; font-size: 10px; font-weight: 700; padding: 6px 0; border-radius: 13px; }
.mode-btn.active { background: #fff; color: #000; }
#pdf-container { flex: 1; overflow: hidden; background: #111; position: relative; touch-action: none; }
#pdf-canvas { position: absolute; transform-origin: 0 0; left: 0; top: 0; will-change: transform; }
.audio-row { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
#time-text { font-size: 12px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div id="splash"><div class="splash-logo">Kei.works</div></div>
<div class="main-wrapper" id="main-content">
  <button id="toggle-btn"></button>
  <aside id="sidebar">
    <canvas id="clock-cvs"></canvas>
    <div id="digital-clock">00:00:00</div>
    <div class="sep"></div>
    <label for="f-p" class="file-select-btn">PDF選択</label>
    <input type="file" id="f-p" accept="application/pdf" style="display:none">
    <div id="pdf-name" style="font-size:12px;margin-bottom:5px;">PDF未選択</div>
    <div class="btn-row"><button id="b-p" class="round-btn">←</button><div id="page-num">0 / 0</div><button id="n-pg" class="round-btn">→</button></div>
    <div class="mode-switch"><button id="m-free" class="mode-btn active">FREE</button><button id="m-fix" class="mode-btn">FIX</button></div>
    <div class="sep"></div>
    <label for="f-a" class="file-select-btn">曲選択</label>
    <input type="file" id="f-a" accept="audio/*" style="display:none">
    <div id="audio-name" style="font-size:12px;">曲未選択</div>
    <div class="audio-row"><button id="p-b" class="round-btn">▶</button><div id="time-text">0:00/0:00</div></div>
  </aside>
  <div id="resizer"></div>
  <main id="pdf-container"><button id="fs-btn">⛶</button><canvas id="pdf-canvas"></canvas></main>
</div>

<script>
(function(){
  const splash = document.getElementById('splash'), main = document.getElementById('main-content');
  window.addEventListener('load', () => setTimeout(() => { splash.style.opacity='0'; main.style.visibility='visible'; }, 1000));

  const sidebar = document.getElementById('sidebar'), toggleBtn = document.getElementById('toggle-btn'), container = document.getElementById('pdf-container');
  let isFreeMode = true, currentWidth = 300;

  toggleBtn.onclick = () => {
    sidebar.classList.toggle('hidden');
    toggleBtn.classList.toggle('is-hidden');
    let offset = sidebar.classList.contains('hidden') ? 0 : currentWidth;
    toggleBtn.style.left = offset + "px";
  };

  function updateClock(){
    const d=new Date(); document.getElementById('digital-clock').textContent=d.toTimeString().split(' ')[0];
    const canvas=document.getElementById('clock-cvs'), ctx=canvas.getContext('2d');
    canvas.width=600; canvas.height=600; ctx.translate(300,300); ctx.clearRect(-300,-300,600,600);
    ctx.beginPath(); ctx.arc(0,0,280,0,Math.PI*2); ctx.strokeStyle='#fff'; ctx.lineWidth=6; ctx.stroke();
    const h=(d.getHours()%12+d.getMinutes()/60)*30, m=(d.getMinutes()+d.getSeconds()/60)*6, s=d.getSeconds()*6;
    const draw = (deg,len,w,col) => { ctx.save(); ctx.rotate(deg*Math.PI/180); ctx.beginPath(); ctx.moveTo(0,20); ctx.lineTo(0,-len); ctx.strokeStyle=col; ctx.lineWidth=w; ctx.lineCap='round'; ctx.stroke(); ctx.restore(); };
    draw(h,160,12,'#fff'); draw(m,230,8,'#fff'); draw(s,250,4,'#ff3b30');
  }
  setInterval(updateClock, 1000); updateClock();

  let doc=null, pn=1, sc=1.0, posX=0, posY=0;
  const cvs=document.getElementById('pdf-canvas'), ctx=cvs.getContext('2d');
  
  async function render() {
    if(!doc) return;
    const pg=await doc.getPage(pn);
    const dpr=window.devicePixelRatio||1;
    const vp=pg.getViewport({scale:sc*dpr});
    cvs.width=vp.width; cvs.height=vp.height;
    cvs.style.width=(vp.width/dpr)+'px'; cvs.style.height=(vp.height/dpr)+'px';
    await pg.render({canvasContext:ctx, viewport:vp}).promise;
    updateTransform(1);
    document.getElementById('page-num').textContent=pn+" / "+doc.numPages;
  }

  function updateTransform(tempScale = 1) {
    cvs.style.transform = `translate(${posX}px, ${posY}px) scale(${tempScale})`;
  }

  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
  document.getElementById('f-p').onchange=(e)=>{
    const f=e.target.files[0]; if(!f) return;
    document.getElementById('pdf-name').textContent=f.name;
    const r=new FileReader(); r.onload=async function(){ 
      doc=await pdfjsLib.getDocument({data:new Uint8Array(this.result)}).promise; 
      pn=1; sc=1.0; posX=0; posY=20; await render();
    }; r.readAsArrayBuffer(f);
  };

  let startDist=0, startScale=1, startX=0, startY=0, pX=0, pY=0, isMoving=false, lastX=0, lastY=0;

  container.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      startDist = Math.hypot(e.touches[1].pageX-e.touches[0].pageX, e.touches[1].pageY-e.touches[0].pageY);
      startScale = sc; startX = posX; startY = posY;
      const rect = container.getBoundingClientRect();
      pX = (e.touches[0].pageX + e.touches[1].pageX)/2 - rect.left;
      pY = (e.touches[0].pageY + e.touches[1].pageY)/2 - rect.top;
    } else if (e.touches.length === 1 && isFreeMode) {
      isMoving = true; lastX = e.touches[0].pageX; lastY = e.touches[0].pageY;
    }
  }, { passive: false });

  container.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 2) {
      const dist = Math.hypot(e.touches[1].pageX-e.touches[0].pageX, e.touches[1].pageY-e.touches[0].pageY);
      const ratio = dist / startDist;
      // ズーム中はCSS変形のみで高速化
      updateTransform(ratio);
    } else if (e.touches.length === 1 && isMoving) {
      posX += (e.touches[0].pageX - lastX); posY += (e.touches[0].pageY - lastY);
      lastX = e.touches[0].pageX; lastY = e.touches[0].pageY;
      updateTransform(1);
    }
  }, { passive: false });

  container.addEventListener('touchend', (e) => {
    if (startDist > 0 && e.touches.length < 2) {
      const rect = container.getBoundingClientRect();
      // 指を離した時に位置と拡大率を確定させて再描画
      const lastDist = startDist * (parseFloat(cvs.style.transform.split('scale(')[1]) || 1);
      const ratio = lastDist / startDist;
      const newScale = startScale * ratio;
      posX = pX - (pX - startX) * ratio;
      posY = pY - (pY - startY) * ratio;
      sc = newScale;
      startDist = 0;
      render(); // ここで高精細化
    }
    isMoving = false;
  });

  document.getElementById('m-fix').onclick = () => { isFreeMode=false; document.getElementById('m-fix').classList.add('active'); document.getElementById('m-free').classList.remove('active'); };
  document.getElementById('m-free').onclick = () => { isFreeMode=true; document.getElementById('m-free').classList.add('active'); document.getElementById('m-fix').classList.remove('active'); };
  document.getElementById('b-p').onclick=()=>{if(doc&&pn>1){pn--;render()}};
  document.getElementById('n-pg').onclick=()=>{if(doc&&pn<doc.numPages){pn++;render()}};
  const au=new Audio(), pb=document.getElementById('p-b'), fa=document.getElementById('f-a');
  fa.onchange=(e)=>{ if(e.target.files[0]) { au.src=URL.createObjectURL(e.target.files[0]); document.getElementById('audio-name').textContent=e.target.files[0].name; } };
  pb.onclick=()=>{ if(au.src){ if(au.paused){ au.play(); pb.textContent="||"; } else { au.pause(); pb.textContent="▶"; } } };
  au.ontimeupdate=()=>{
    const fmt = (t) => { if(!t || isNaN(t)) return "0:00"; const m=Math.floor(t/60), s=Math.floor(t%60); return m + ":" + s.toString().padStart(2,'0'); };
    document.getElementById('time-text').textContent = fmt(au.currentTime) + "/" + fmt(au.duration);
  };
})();
</script>
</body>
</html>
